services:
  flipflow:
    build: .
    ports:
      - "8080:3001"
    env_file:
      - .env
    volumes:
      - flipflow-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  flipflow-data:
